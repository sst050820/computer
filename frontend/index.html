<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>农禾坊 | 特色农产品购物平台</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="role-badge-side" id="roleBadgeSide"></div>
    <nav class="menu" id="sideMenu"></nav>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
  </aside>

  <!-- Taobao Top Navigation Bar -->
  <div class="tb-topbar" id="topBar" style="display:none;">
    <div class="tb-logo"><i class="fas fa-leaf"></i> <span>农淘</span></div>
    <div class="tb-search">
      <input id="tbSearchInput" placeholder="搜索农产品、产地、店铺..." />
      <button id="tbSearchBtn"><i class="fas fa-search"></i></button>
    </div>
    <div class="tb-actions">
      <button class="tb-action-btn" id="tbCartBtn"><i class="fas fa-shopping-cart"></i> <span>购物车</span><span class="tb-cart-badge" id="tbCartBadge" style="display:none;">0</span></button>
      <button class="tb-action-btn" id="tbMsgBtn"><i class="fas fa-envelope"></i> <span>消息</span></button>
      <button class="tb-action-btn" id="tbUserBtn"><i class="fas fa-user-circle"></i> <span id="tbUserName">我的</span></button>
    </div>
  </div>

  <main class="content" id="mainContent">

    <!-- Login Page (Taobao Style) -->
    <div id="loginPage">
      <div class="login-container">
        <div class="login-card">
          <div class="tb-logo-text">
            <i class="fas fa-leaf" style="font-size:2.5rem;color:var(--tb-orange);"></i>
            <h1>农淘</h1>
            <p>特色农产品 · 源头直供 · 安心溯源</p>
          </div>
          <div id="loginForm" style="display:grid;gap:12px;">
            <label style="font-size:0.85rem;font-weight:500;">用户名</label>
            <input id="loginUsername" placeholder="输入用户名" autocomplete="username" />
            <label style="font-size:0.85rem;font-weight:500;">密码</label>
            <input id="loginPassword" type="password" placeholder="输入密码" autocomplete="current-password" />
            <div id="loginError" style="color:#ef4444;font-size:0.85rem;display:none;"></div>
            <button class="btn" id="loginSubmitBtn" style="width:100%;padding:12px;justify-content:center;font-size:0.95rem;"><i class="fas fa-sign-in-alt"></i> 登录</button>
          </div>
          <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--tb-text-secondary);">
            还没有账号？<a href="#" id="showRegisterLink" style="color:var(--tb-orange);font-weight:600;">立即注册</a>
          </p>
        </div>
        <div v-if="loginError" class="form-error">{{ loginError }}</div>
        <button class="btn btn-primary btn-block btn-lg" @click="doLogin">
          <i class="fas fa-sign-in-alt"></i> 登录
        </button>
      </div>
      <p style="text-align:center;margin-top:20px;font-size:0.875rem;color:var(--co-neutral-500);">
        还没有账号？<a href="#" @click.prevent="authMode='register'" style="color:var(--co-primary-500);font-weight:600;">立即注册</a>
      </p>
    </div>

    <!-- Register -->
    <div v-else class="login-box" style="max-width:480px;">
      <div class="logo-area" style="margin-bottom:20px;">
        <h1 style="font-size:1.5rem;">注册新账号</h1>
      </div>
      <div style="display:grid;gap:12px;">
        <div class="form-group"><label class="form-label">用户名 *</label><input class="form-input" v-model="regForm.username" placeholder="3-20位字母数字" /></div>
        <div class="form-group"><label class="form-label">密码 *</label><input class="form-input" v-model="regForm.password" type="password" placeholder="至少6位" /></div>
        <div class="form-group"><label class="form-label">确认密码 *</label><input class="form-input" v-model="regForm.password2" type="password" placeholder="再次输入密码" /></div>
        <div class="form-group"><label class="form-label">姓名/机构名 *</label><input class="form-input" v-model="regForm.name" placeholder="您的姓名或机构名称" /></div>
        <div class="form-group"><label class="form-label">角色</label>
          <select class="form-select" v-model="regForm.role">
            <option value="consumer">消费者（购物）</option>
            <option value="merchant">商家（开店）</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">手机号</label><input class="form-input" v-model="regForm.phone" placeholder="选填" /></div>
        <div class="form-group"><label class="form-label">所在地</label><input class="form-input" v-model="regForm.location" placeholder="选填" /></div>
        <div v-if="regError" class="form-error">{{ regError }}</div>
        <button class="btn btn-primary btn-block btn-lg" @click="doRegister"><i class="fas fa-check"></i> 注册</button>
        <button class="btn btn-outline btn-block" @click="authMode='login'"><i class="fas fa-arrow-left"></i> 返回登录</button>
      </div>
    </div>

    <!-- Main Page Area -->
    <div id="pageArea" style="display:none;">
      <div class="topbar"><div class="title-section"><h2 id="pageTitle">系统总览</h2><p class="subtitle" id="pageSubtitle"></p></div></div>
      <div id="pageContainer"></div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/vue@3.4/dist/vue.global.prod.js"></script>
<script src="/js/utils.js"></script>
<!-- Base Vue Components (Phase 2) -->
<script src="/js/components/base-button.js"></script>
<script src="/js/components/base-card.js"></script>
<script src="/js/components/base-input.js"></script>
<script src="/js/components/base-modal.js"></script>
<script src="/js/components/base-badge.js"></script>
<script src="/js/components/base-tag.js"></script>
<script src="/js/components/base-toast.js"></script>
<script src="/js/components/base-loading.js"></script>
<script src="/js/components/base-empty.js"></script>
<!-- Vue Page Components (Phase 3) -->
<script src="/js/pages/vue/discovery.js"></script>
<script src="/js/pages/vue/cart.js"></script>
<script src="/js/pages/vue/dashboard.js"></script>
<script src="/js/pages/vue/profile.js"></script>
<script src="/js/pages/vue/custom-order.js"></script>
<script src="/js/pages/vue/demand-market.js"></script>
<script src="/js/pages/vue/qualifications.js"></script>
<script src="/js/pages/vue/product-list.js"></script>
<script src="/js/pages/vue/my-orders.js"></script>
<script src="/js/pages/vue/review-list.js"></script>
<script src="/js/pages/vue/archive-search.js"></script>
<script src="/js/pages/vue/emergency.js"></script>
<script src="/js/pages/vue/user-management.js"></script>
<script src="/js/pages/vue/rule-management.js"></script>
<script src="/js/pages/vue/order-square.js"></script>
<script src="/js/pages/vue/messages.js"></script>
<script src="/js/pages/vue/merchant-orders.js"></script>
<script src="/js/pages/vue/my-shop.js"></script>
<script src="/js/pages/vue/review-history.js"></script>
<script src="/js/pages/vue/qual-management.js"></script>
<script src="/js/pages/vue/statistics.js"></script>
<script src="/js/pages/vue/certifier-management.js"></script>
<script src="/js/pages/vue/content-audit.js"></script>
<script src="/js/pages/vue/dispute.js"></script>
<script src="/js/pages/vue/reports.js"></script>
<script src="/js/pages/vue/merchant-audit.js"></script>
<script src="/js/pages/vue/product-spot.js"></script>
<!-- Legacy Components -->
<script src="/js/components/product-card.js"></script>
<script src="/js/components/condition-selector.js"></script>
<script src="/js/components/qualification-tags.js"></script>
<script src="/js/api.js"></script>
<script src="/js/pages/pages.js"></script>
<script src="/js/app.js"></script>
<script src="/js/vue-app.js"></script>
</body>
</html>
