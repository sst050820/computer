<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>农淘 | 特色农产品购物平台</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="role-badge-side" id="roleBadgeSide"></div>
    <nav class="menu" id="sideMenu"></nav>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出登录</button>
  </aside>

  <!-- Taobao Top Navigation Bar -->
  <div class="tb-topbar" id="topBar" style="display:none;">
    <div class="tb-logo"><i class="fas fa-leaf"></i> <span>农淘</span></div>
    <div class="tb-search">
      <input id="tbSearchInput" placeholder="搜索农产品、产地、店铺..." />
      <button id="tbSearchBtn"><i class="fas fa-search"></i></button>
    </div>
    <div class="tb-actions">
      <button class="tb-action-btn" id="tbCartBtn"><i class="fas fa-shopping-cart"></i> <span>购物车</span><span class="tb-cart-badge" id="tbCartBadge" style="display:none;">0</span></button>
      <button class="tb-action-btn" id="tbMsgBtn"><i class="fas fa-envelope"></i> <span>消息</span></button>
      <button class="tb-action-btn" id="tbUserBtn"><i class="fas fa-user-circle"></i> <span id="tbUserName">我的</span></button>
    </div>
  </div>

  <main class="content" id="mainContent">

    <!-- Login Page (Taobao Style) -->
    <div id="loginPage">
      <div class="login-container">
        <div class="login-card">
          <div class="tb-logo-text">
            <i class="fas fa-leaf" style="font-size:2.5rem;color:var(--tb-orange);"></i>
            <h1>农淘</h1>
            <p>特色农产品 · 源头直供 · 安心溯源</p>
          </div>
          <div id="loginForm" style="display:grid;gap:12px;">
            <label style="font-size:0.85rem;font-weight:500;">用户名</label>
            <input id="loginUsername" placeholder="输入用户名" autocomplete="username" />
            <label style="font-size:0.85rem;font-weight:500;">密码</label>
            <input id="loginPassword" type="password" placeholder="输入密码" autocomplete="current-password" />
            <div id="loginError" style="color:#ef4444;font-size:0.85rem;display:none;"></div>
            <button class="btn" id="loginSubmitBtn" style="width:100%;padding:12px;justify-content:center;font-size:0.95rem;"><i class="fas fa-sign-in-alt"></i> 登录</button>
          </div>
          <p style="text-align:center;margin-top:16px;font-size:0.85rem;color:var(--tb-text-secondary);">
            还没有账号？<a href="#" id="showRegisterLink" style="color:var(--tb-orange);font-weight:600;">立即注册</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Register Page (Taobao Style) -->
    <div id="registerPage" style="display:none;">
      <div class="login-container">
        <div class="login-card" style="max-width:500px;padding:32px 28px;">
          <div class="tb-logo-text" style="margin-bottom:16px;">
            <h1 style="font-size:1.5rem;">注册新账号</h1>
          </div>
          <div style="display:grid;gap:12px;">
            <label style="font-size:0.8rem;font-weight:500;">用户名 *</label><input id="regUsername" placeholder="3-20位字母数字" />
            <label style="font-size:0.8rem;font-weight:500;">密码 *</label><input id="regPassword" type="password" placeholder="至少6位" />
            <label style="font-size:0.8rem;font-weight:500;">确认密码 *</label><input id="regPassword2" type="password" placeholder="再次输入密码" />
            <label style="font-size:0.8rem;font-weight:500;">姓名/机构名 *</label><input id="regName" placeholder="您的姓名或机构名称" />
            <label style="font-size:0.8rem;font-weight:500;">角色</label><select id="regRole"><option value="consumer">消费者（购物）</option><option value="merchant">商家（开店）</option></select>
            <label style="font-size:0.8rem;font-weight:500;">手机号</label><input id="regPhone" placeholder="选填" />
            <label style="font-size:0.8rem;font-weight:500;">所在地</label><input id="regLocation" placeholder="选填" />
            <div id="regError" style="color:#ef4444;font-size:0.85rem;display:none;"></div>
            <button class="btn" id="registerSubmitBtn" style="width:100%;padding:12px;justify-content:center;"><i class="fas fa-check"></i> 注册</button>
            <button class="btn btn-outline" id="backToLoginBtn"><i class="fas fa-arrow-left"></i> 返回登录</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Page Area -->
    <div id="pageArea" style="display:none;">
      <div class="topbar"><div class="title-section"><h2 id="pageTitle">系统总览</h2><p class="subtitle" id="pageSubtitle"></p></div></div>
      <div id="pageContainer"></div>
    </div>
  </main>
</div>
<div id="dynamic-toast"></div>

<!-- Mini cart toast -->
<div id="cartToast" style="display:none;position:fixed;bottom:80px;right:24px;z-index:9998;background:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,0.15);font-size:0.85rem;">
  <i class="fas fa-check-circle" style="color:var(--tb-green);"></i> 已加入购物车
</div>

<script src="/js/utils.js"></script>
<script src="/js/components/product-card.js"></script>
<script src="/js/components/condition-selector.js"></script>
<script src="/js/components/qualification-tags.js"></script>
<script src="/js/api.js"></script>
<script src="/js/pages/pages.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
